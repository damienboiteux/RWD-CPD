<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <!-- Documentation : https://swiperjs.com/get-started -->
     <!-- Démos : https://swiperjs.com/demos -->
    <!-- CSS de swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12.1.3/swiper-bundle.min.css">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">Slide 1</div>
            <div class="swiper-slide">Slide 2</div>
            <div class="swiper-slide">Slide 3</div>
            <div class="swiper-slide">Slide 4</div>
            <div class="swiper-slide">Slide 5</div>
        </div>
        <div class="swiper-pagination"></div>
        <button class="swipper-button-prev">Prev</button>
        <button class="swipper-button-next">Next</button>
    </div>
    <!-- Javascript de Swiper -->
     <script src="https://cdn.jsdelivr.net/npm/swiper@12.1.3/swiper-bundle.min.js"></script>
     <script>
        const swipper = new Swiper('.swiper', {
            loop: true,
            navigation: {
                nextEl: '.swipper-button-next',
                prevEl: '.swipper-button-prev',
            },
            pagination: {
                el: '.swiper-pagination',
                // clickable: true,
            },
            // Responsive
            breakpoints: {
                640: {
                    slidesPerView: 1,
                },
                768: {
                    slidesPerView: 2,
                },
                1024: {
                    slidesPerView: 3,
                },
            },
        });
    </script>
</body>
</html>
